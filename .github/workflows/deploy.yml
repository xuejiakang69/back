name: Deploy Java Backend

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v5


      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Build jar
        run: |
          mvn clean package -DskipTests


      - name: Check jar
        run: |
          ls -lh target


      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}

          source: "target/*.jar"
          target: "/www/wwwroot/java"


      - name: Restart Java
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}

          timeout: 60s
          command_timeout: 2m

          script: |

            cd /www/wwwroot/java


            echo "====== 查找jar ======"

            JAR=$(ls *.jar | head -1)


            if [ -z "$JAR" ]; then
              echo "没有找到jar文件"
              exit 1
            fi


            echo "当前jar: $JAR"



            echo "====== 停止旧服务 ======"


            PID=$(ps -ef | grep "$JAR" | grep -v grep | awk '{print $2}')


            if [ -n "$PID" ]; then

              kill $PID

              echo "旧服务停止 PID=$PID"

              sleep 3

            else

              echo "没有发现旧服务"

            fi



            echo "====== 启动新服务 ======"


            nohup java -jar "$JAR" > java.log 2>&1 &



            sleep 10



            echo "====== 检查服务 ======"


            NEW_PID=$(ps -ef | grep "$JAR" | grep -v grep | awk '{print $2}')


            if [ -n "$NEW_PID" ]; then

              echo "================================"
              echo " Java部署成功"
              echo " PID: $NEW_PID"
              echo " JAR: $JAR"
              echo " 日志: /www/wwwroot/java/java.log"
              echo "================================"

            else

              echo "Java启动失败"

              echo "查看日志:"
              cat java.log

              exit 1

            fi



      - name: Deploy Success
        run: |
          echo "================================"
          echo "🎉 Java 后端部署成功"
          echo "服务器: ${{ secrets.SERVER_HOST }}"
          echo "时间: $(date)"
          echo "================================"