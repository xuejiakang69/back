name: Deploy Java Backend

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v5


      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Build jar
        run: |
          mvn clean package -DskipTests


      - name: Upload jar
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "target/*.jar"
          target: "/www/wwwroot/java"


      - name: Restart Java
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |
            cd /www/wwwroot/java

            pkill -f shop-api.jar || true

            nohup java -jar shop-api.jar > java.log 2>&1 &